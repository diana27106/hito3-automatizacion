version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: hito3-postgres
    restart: always
    environment:
      POSTGRES_USER: hito3
      POSTGRES_PASSWORD: hito3pass
      POSTGRES_DB: hito3db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  qdrant:
    image: qdrant/qdrant
    container_name: hito3-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  n8n:
    image: n8nio/n8n
    container_name: hito3-n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=hito3db
      - DB_POSTGRESDB_USER=hito3
      - DB_POSTGRESDB_PASSWORD=hito3pass
    depends_on:
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  qdrant_data:
  n8n_data:
